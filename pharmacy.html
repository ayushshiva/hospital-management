<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pharmacy | Hospital Management System</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>
  <body data-page="pharmacy">
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">+</div>
          <div>
            <h2>Northstar</h2>
            <p>Hospital</p>
          </div>
        </div>
        <nav class="nav-links">
          <a href="dashboard.html">Dashboard</a>
          <a href="patients.html">Patients</a>
          <a href="doctors.html">Doctors</a>
          <a href="appointments.html">Appointments</a>
          <a href="departments.html">Departments</a>
          <a href="rooms.html">Rooms</a>
          <a href="billing.html">Billing</a>
          <a href="pharmacy.html" class="active">Pharmacy</a>
          <a href="laboratory.html">Laboratory</a>
          <a href="staff.html">Staff</a>
          <a href="reports.html">Reports</a>
          <a href="settings.html">Settings</a>
          <a href="#" id="logout-link">Logout</a>
        </nav>
      </aside>
      <main class="main-content">
        <header class="topbar">
          <div>
            <p class="eyebrow">Pharmacy</p>
            <h1>Medicine Inventory</h1>
          </div>
          <div class="topbar-actions">
            <button class="btn-toggle" id="theme-toggle" type="button">🌙</button>
            <div class="user-pill" id="user-pill">Loading...</div>
          </div>
        </header>
        <section class="card page-card">
          <div class="card-head"><h3>Current Stock</h3><button class="btn btn-primary" id="add-medicine-btn" type="button">Add Medicine</button></div>
          <div class="table-wrap"><table><thead><tr><th>Name</th><th>Stock</th><th>Expiry</th><th>Price</th><th>Supplier</th><th>Actions</th></tr></thead><tbody id="medicines-table-body"></tbody></table></div>
        </section>
      </main>
    </div>
    <div id="toast-stack"></div>
    <div class="modal-overlay" id="medicine-modal">
      <div class="modal-card">
        <div class="modal-head"><h3 id="medicine-modal-title">Add Medicine</h3><button class="icon-btn" data-modal-close type="button">×</button></div>
        <form id="medicine-form" class="form-grid">
          <input type="hidden" id="medicine-id" />
          <label><span>Medicine Name *</span><input type="text" id="medicine-name" required /></label>
          <label><span>Brand</span><input type="text" id="medicine-brand" /></label>
          <label><span>Category</span><select id="medicine-category"><option>Analgesic</option><option>Antibiotic</option><option>Antiviral</option><option>Cardiac</option><option>Neurology</option><option>Vitamin</option><option>Other</option></select></label>
          <label><span>Manufacturer</span><input type="text" id="medicine-manufacturer" /></label>
          <label><span>Batch Number</span><input type="text" id="medicine-batch" /></label>
          <label><span>Expiry Date</span><input type="date" id="medicine-expiry" /></label>
          <label><span>Purchase Price (₹)</span><input type="number" id="medicine-purchase-price" min="0" step="0.01" /></label>
          <label><span>Selling Price (₹)</span><input type="number" id="medicine-selling-price" min="0" step="0.01" /></label>
          <label><span>Quantity</span><input type="number" id="medicine-quantity" min="0" /></label>
          <label><span>Minimum Stock Alert</span><input type="number" id="medicine-min-stock" min="0" value="10" /></label>
          <label><span>Rack Number</span><input type="text" id="medicine-rack" /></label>
          <label><span>Supplier</span><input type="text" id="medicine-supplier" /></label>
          <label><span>GST (%)</span><input type="number" id="medicine-gst" min="0" step="0.1" /></label>
          <label><span>Barcode</span><input type="text" id="medicine-barcode" /></label>
          <div class="form-actions"><button class="btn btn-secondary" type="button" data-modal-close>Cancel</button><button class="btn btn-primary" type="submit">Save</button></div>
        </form>
      </div>
    </div>
    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/pharmacy.js"></script>
  </body>
</html>
