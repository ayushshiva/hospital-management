<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reports | Hospital Management System</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>
  <body data-page="reports">
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">+</div>
          <div>
            <h2>Northstar</h2>
            <p>Hospital</p>
          </div>
        <nav class="nav-links">
          <a href="dashboard.html">Dashboard</a>
          <a href="patients.html">Patients</a>
          <a href="doctors.html">Doctors</a>
          <a href="appointments.html">Appointments</a>
          <a href="departments.html">Departments</a>
          <a href="rooms.html">Rooms</a>
          <a href="billing.html">Billing</a>
          <a href="pharmacy.html">Pharmacy</a>
          <a href="laboratory.html">Laboratory</a>
          <a href="staff.html">Staff</a>
          <a href="reports.html" class="active">Reports</a>
          <a href="settings.html">Settings</a>
          <a href="#" id="logout-link">Logout</a>
        </nav>
      </aside>
      <main class="main-content">
        <header class="topbar">
          <div>
            <p class="eyebrow">Reports</p>
            <h1>Medical Reports</h1>
          </div>
          <div class="topbar-actions">
            <button class="btn-toggle" id="theme-toggle" type="button">🌙</button>
            <div class="user-pill" id="user-pill">Loading...</div>
        </header>
        <section class="card page-card">
          <div class="card-head"><h3>Report Center</h3><button class="btn btn-primary" id="upload-report-btn" type="button">Upload Report</button></div>
          <div id="report-output" class="report-output"></div>
        </section>
      </main>
    </div>
    <div id="toast-stack"></div>
    <!-- Report Upload/Edit Modal -->
    <div class="modal-overlay" id="report-modal">
      <div class="modal-card">
        <div class="modal-head"><h3 id="report-modal-title">Upload Report</h3><button class="icon-btn" data-modal-close type="button">×</button></div>
        <form id="report-form" class="form-grid">
          <input type="hidden" id="report-id" />
          <label><span>Report Type *</span><select id="report-type"><option>Lab Report</option><option>Prescription</option><option>Scan Report</option><option>X-Ray</option><option>MRI</option><option>CT Scan</option><option>Blood Report</option><option>Ultrasound</option><option>ECG</option></select></label>
          <label><span>Patient ID *</span><input type="text" id="report-patient-id" required /></label>
          <label><span>Patient Name *</span><input type="text" id="report-patient-name" required /></label>
          <label><span>Doctor</span><input type="text" id="report-doctor" /></label>
          <label><span>Department</span><input type="text" id="report-department" /></label>
          <label><span>Date</span><input type="date" id="report-date" /></label>
          <label style="grid-column:1/-1;"><span>Description</span><textarea id="report-description" rows="3"></textarea></label>
          <label style="grid-column:1/-1;"><span>Upload File (PDF, Image, Word)</span><input type="file" id="report-file" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png,.gif" /></label>
          <p id="report-file-info" style="grid-column:1/-1;color:var(--muted);font-size:0.85rem;"></p>
          <div class="form-actions"><button class="btn btn-secondary" type="button" data-modal-close>Cancel</button><button class="btn btn-primary" type="submit">Save</button></div>
        </form>
      </div>
    <div class="modal-overlay" id="confirm-modal">
      <div class="modal-card">
        <p id="confirm-message"></p>
        <div class="modal-actions">
          <button class="btn btn-secondary" type="button" data-modal-cancel>Cancel</button>
          <button class="btn btn-primary" type="button" data-modal-confirm>Confirm</button>
        </div>
    </div>
    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/reports.js"></script>
  </body>
</html>
