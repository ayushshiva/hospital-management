<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HMS Login</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>
  <body class="auth-page" data-page="login">
    <div class="auth-shell">
      <div class="auth-card">
        <div class="auth-brand">
          <div class="brand-mark">+</div>
          <div>
            <h1>Northstar Hospital</h1>
            <p>Hospital Management System</p>
          </div>
        </div>
        <form id="login-form" class="form-grid">
          <label>
            <span>Username</span>
            <input type="text" name="username" id="username" required />
          </label>
          <label>
            <span>Password</span>
            <input type="password" name="password" id="password" required />
          </label>
          <button class="btn btn-primary btn-block" type="submit">Login</button>
        </form>
        <div class="demo-list">
          <h3>Demo Accounts</h3>
          <div class="demo-card">Admin · admin / admin123</div>
          <div class="demo-card">Doctor · doctor / doctor123</div>
          <div class="demo-card">Receptionist · reception / reception123</div>
        </div>
      </div>
    </div>
    <div id="toast-stack"></div>
    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
