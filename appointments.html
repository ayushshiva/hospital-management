<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Appointments | Hospital Management System</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>
  <body data-page="appointments">
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">+</div>
          <div>
            <h2>Northstar</h2>
            <p>Hospital</p>
          </div>
        </div>
        <nav class="nav-links">
          <a href="dashboard.html">Dashboard</a>
          <a href="patients.html">Patients</a>
          <a href="doctors.html">Doctors</a>
          <a href="appointments.html" class="active">Appointments</a>
          <a href="departments.html">Departments</a>
          <a href="rooms.html">Rooms</a>
          <a href="billing.html">Billing</a>
          <a href="pharmacy.html">Pharmacy</a>
          <a href="laboratory.html">Laboratory</a>
          <a href="staff.html">Staff</a>
          <a href="reports.html">Reports</a>
          <a href="settings.html">Settings</a>
          <a href="#" id="logout-link">Logout</a>
        </nav>
      </aside>
      <main class="main-content">
        <header class="topbar">
          <div>
            <p class="eyebrow">Appointment Management</p>
            <h1>Appointments</h1>
          </div>
          <div class="topbar-actions">
            <button class="btn-toggle" id="theme-toggle" type="button">🌙</button>
            <div class="user-pill" id="user-pill">Loading...</div>
          </div>
        </header>
        <section class="card page-card">
          <div class="card-head">
            <h3>Appointments</h3>
            <button class="btn btn-primary" id="add-appointment-btn" type="button">Book Appointment</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>ID</th><th>Patient</th><th>Doctor</th><th>Department</th><th>Date</th><th>Time</th><th>Status</th><th>Actions</th></tr>
              </thead>
              <tbody id="appointments-table-body"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
    <div id="toast-stack"></div>
    <div class="modal-overlay" id="appointment-modal">
      <div class="modal-card">
        <div class="modal-head"><h3 id="appointment-modal-title">Book Appointment</h3><button class="icon-btn" data-modal-close type="button">×</button></div>
        <form id="appointment-form" class="form-grid">
          <input type="hidden" id="appointment-id" />
          <label><span>Patient</span><input type="text" id="appointment-patient" required /></label>
          <label><span>Doctor</span><input type="text" id="appointment-doctor" required /></label>
          <label><span>Department</span><input type="text" id="appointment-department" required /></label>
          <label><span>Date</span><input type="date" id="appointment-date" required /></label>
          <label><span>Time</span><input type="time" id="appointment-time" required /></label>
          <label><span>Status</span><select id="appointment-status"><option>Scheduled</option><option>Completed</option><option>Cancelled</option></select></label>
          <div class="form-actions"><button class="btn btn-secondary" type="button" data-modal-close>Cancel</button><button class="btn btn-primary" type="submit">Save</button></div>
        </form>
      </div>
    </div>
    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/appointments.js"></script>
  </body>
</html>
