<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patients | Hospital Management System</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>
  <body data-page="patients">
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">+</div>
          <div>
            <h2>Northstar</h2>
            <p>Hospital</p>
          </div>
        </div>
        <nav class="nav-links">
          <a href="dashboard.html">Dashboard</a>
          <a href="patients.html" class="active">Patients</a>
          <a href="doctors.html">Doctors</a>
          <a href="appointments.html">Appointments</a>
          <a href="departments.html">Departments</a>
          <a href="rooms.html">Rooms</a>
          <a href="billing.html">Billing</a>
          <a href="pharmacy.html">Pharmacy</a>
          <a href="laboratory.html">Laboratory</a>
          <a href="staff.html">Staff</a>
          <a href="reports.html">Reports</a>
          <a href="settings.html">Settings</a>
          <a href="#" id="logout-link">Logout</a>
        </nav>
      </aside>
      <main class="main-content">
        <header class="topbar">
          <div>
            <p class="eyebrow">Patient Management</p>
            <h1>Patients</h1>
          </div>
          <div class="topbar-actions">
            <button class="btn-toggle" id="theme-toggle" type="button">🌙</button>
            <div class="user-pill" id="user-pill">Loading...</div>
          </div>
        </header>
        <section class="card page-card">
          <div class="card-head">
            <h3>Patient Records</h3>
            <div class="button-row">
              <button class="btn btn-primary" id="add-patient-btn" type="button">Add Patient</button>
              <button class="btn btn-secondary" id="export-patients-btn" type="button">Export CSV</button>
            </div>
          </div>
          <div class="toolbar">
            <input id="patient-search" type="search" placeholder="Search by name, disease, or phone" />
            <select id="patient-status-filter">
              <option value="all">All Status</option>
              <option value="Admitted">Admitted</option>
              <option value="Outpatient">Outpatient</option>
              <option value="Discharged">Discharged</option>
            </select>
            <select id="patient-sort">
              <option value="newest">Newest</option>
              <option value="name">Name</option>
              <option value="age">Age</option>
            </select>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th><th>Name</th><th>Age</th><th>Gender</th><th>Disease</th><th>Doctor</th><th>Status</th><th>Actions</th>
                </tr>
              </thead>
              <tbody id="patients-table-body"></tbody>
            </table>
          </div>
          <div class="pagination" id="patient-pagination"></div>
        </section>
      </main>
    </div>
    <div id="toast-stack"></div>
    <div class="modal-overlay" id="patient-modal">
      <div class="modal-card">
        <div class="modal-head">
          <h3 id="patient-modal-title">Add Patient</h3>
          <button class="icon-btn" type="button" data-modal-close>×</button>
        </div>
        <form id="patient-form" class="form-grid">
          <input type="hidden" id="patient-id" />
          <label><span>Name</span><input type="text" id="patient-name" required /></label>
          <label><span>Age</span><input type="number" id="patient-age" required /></label>
          <label><span>Gender</span><select id="patient-gender"><option>Male</option><option>Female</option><option>Other</option></select></label>
          <label><span>Blood Group</span><input type="text" id="patient-blood" /></label>
          <label><span>Phone</span><input type="tel" id="patient-phone" required /></label>
          <label><span>Email</span><input type="email" id="patient-email" /></label>
          <label><span>Address</span><input type="text" id="patient-address" /></label>
          <label><span>Disease</span><input type="text" id="patient-disease" /></label>
          <label><span>Doctor Assigned</span><input type="text" id="patient-doctor" /></label>
          <label><span>Admission Date</span><input type="date" id="patient-admission" /></label>
          <label><span>Status</span><select id="patient-status"><option>Admitted</option><option>Outpatient</option><option>Discharged</option></select></label>
          <div class="form-actions"><button class="btn btn-secondary" type="button" data-modal-close>Cancel</button><button class="btn btn-primary" type="submit">Save</button></div>
        </form>
      </div>
    </div>
    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/patients.js"></script>
  </body>
</html>
