<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rooms | Hospital Management System</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>
  <body data-page="rooms">
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">+</div>
          <div>
            <h2>Northstar</h2>
            <p>Hospital</p>
          </div>
        </div>
        <nav class="nav-links">
          <a href="dashboard.html">Dashboard</a>
          <a href="patients.html">Patients</a>
          <a href="doctors.html">Doctors</a>
          <a href="appointments.html">Appointments</a>
          <a href="departments.html">Departments</a>
          <a href="rooms.html" class="active">Rooms</a>
          <a href="billing.html">Billing</a>
          <a href="pharmacy.html">Pharmacy</a>
          <a href="laboratory.html">Laboratory</a>
          <a href="staff.html">Staff</a>
          <a href="reports.html">Reports</a>
          <a href="settings.html">Settings</a>
          <a href="#" id="logout-link">Logout</a>
        </nav>
      </aside>
      <main class="main-content">
        <header class="topbar">
          <div>
            <p class="eyebrow">Room Management</p>
            <h1>Rooms</h1>
          </div>
          <div class="topbar-actions">
            <button class="btn-toggle" id="theme-toggle" type="button">🌙</button>
            <div class="user-pill" id="user-pill">Loading...</div>
          </div>
        </header>
        <section class="card page-card">
          <div class="card-head">
            <h3>Room Inventory</h3>
            <button class="btn btn-primary" id="add-room-btn" type="button">Add Room</button>
          </div>
          <div class="grid-cards" id="rooms-grid"></div>
        </section>
      </main>
    </div>
    <div id="toast-stack"></div>
    <div class="modal-overlay" id="room-modal">
      <div class="modal-card">
        <div class="modal-head"><h3 id="room-modal-title">Add Room</h3><button class="icon-btn" data-modal-close type="button">×</button></div>
        <form id="room-form" class="form-grid">
          <input type="hidden" id="room-id" />
          <label><span>Room Number *</span><input type="text" id="room-number" required /></label>
          <label><span>Room Type</span><select id="room-type"><option>General</option><option>Private</option><option>Deluxe</option><option>ICU</option><option>Ward</option></select></label>
          <label><span>Ward</span><input type="text" id="room-ward" /></label>
          <label><span>Floor</span><input type="number" id="room-floor" min="0" /></label>
          <label><span>Bed Count</span><input type="number" id="room-bed-count" min="1" /></label>
          <label><span>Price Per Day (₹)</span><input type="number" id="room-price" min="0" /></label>
          <label><span>Status</span><select id="room-status"><option>Available</option><option>Occupied</option><option>Cleaning</option><option>Maintenance</option></select></label>
          <label><span>Assigned Patient</span><input type="text" id="room-patient" /></label>
          <label><span>Admission Date</span><input type="date" id="room-admission" /></label>
          <label><span>Discharge Date</span><input type="date" id="room-discharge" /></label>
          <label style="grid-column:1/-1;"><span>Features</span>
            <div style="display:flex;flex-wrap:wrap;gap:12px;margin-top:4px;">
              <label style="flex-direction:row;align-items:center;gap:6px;"><input type="checkbox" name="room-features" value="AC" /> AC</label>
              <label style="flex-direction:row;align-items:center;gap:6px;"><input type="checkbox" name="room-features" value="Non AC" /> Non AC</label>
              <label style="flex-direction:row;align-items:center;gap:6px;"><input type="checkbox" name="room-features" value="ICU" /> ICU</label>
              <label style="flex-direction:row;align-items:center;gap:6px;"><input type="checkbox" name="room-features" value="Oxygen" /> Oxygen</label>
              <label style="flex-direction:row;align-items:center;gap:6px;"><input type="checkbox" name="room-features" value="Private Bathroom" /> Private Bathroom</label>
              <label style="flex-direction:row;align-items:center;gap:6px;"><input type="checkbox" name="room-features" value="TV" /> TV</label>
              <label style="flex-direction:row;align-items:center;gap:6px;"><input type="checkbox" name="room-features" value="WiFi" /> WiFi</label>
            </div>
          </label>
          <div class="form-actions"><button class="btn btn-secondary" type="button" data-modal-close>Cancel</button><button class="btn btn-primary" type="submit">Save</button></div>
        </form>
      </div>
    </div>
    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/rooms.js"></script>
  </body>
</html>
